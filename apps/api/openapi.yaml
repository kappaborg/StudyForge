openapi: 3.1.0
info:
  title: StudyForge AI API
  version: 0.1.0
  summary: Gateway for the StudyForge AI platform.
  description: |
    Conventions (mandatory):
      - All errors are application/problem+json (RFC 9457) with a stable `code`.
      - Lists paginate by opaque cursor only.
      - State-changing endpoints require `Idempotency-Key`.
      - Rate limits exposed via `RateLimit-*` headers.
      - Streams are SSE; bidirectional surfaces use WebSocket.
    See docs/architecture/04-api-design.md.
  contact:
    name: StudyForge Platform
    url: https://studyforge.ai
  license:
    name: Proprietary

servers:
  - url: http://localhost:3001
    description: Local dev
  - url: https://api.studyforge.ai
    description: Production

tags:
  - { name: auth,           description: OAuth + session management }
  - { name: lti,            description: LTI 1.3 launch + JWKS }
  - { name: me,             description: Current user }
  - { name: tenants,        description: Tenant + institution metadata }
  - { name: courses,        description: Courses + enrollment }
  - { name: uploads,        description: Resumable uploads }
  - { name: documents,      description: Documents + versions + chunks }
  - { name: graph,          description: Knowledge graph }
  - { name: roadmap,        description: Roadmaps + milestones }
  - { name: flashcards,     description: Flashcards }
  - { name: quizzes,        description: Quizzes + attempts }
  - { name: chat,           description: Tutor chat (SSE + WS) }
  - { name: search,         description: Hybrid search }
  - { name: notifications,  description: User inbox }
  - { name: billing,        description: Stripe subscription + webhook }
  - { name: byok,           description: Bring-your-own-key vault }
  - { name: dsar,           description: GDPR access / erasure / portability }
  - { name: admin,          description: Admin + institution dashboards }
  - { name: health,         description: Liveness + readiness }

security:
  - bearer: []

paths:
  # ───────────────────────── health ─────────────────────────
  /health:
    get:
      tags: [health]
      summary: Liveness
      security: []
      responses:
        "200": { $ref: "#/components/responses/HealthOk" }

  /health/ready:
    get:
      tags: [health]
      summary: Readiness
      security: []
      responses:
        "200": { $ref: "#/components/responses/HealthOk" }

  # ───────────────────────── auth ─────────────────────────
  /v1/auth/oauth/{provider}/start:
    post:
      tags: [auth]
      summary: Begin OAuth flow
      security: []
      parameters:
        - { in: path, name: provider, required: true, schema: { $ref: "#/components/schemas/OAuthProvider" } }
      responses:
        "200":
          description: Redirect URL
          content:
            application/json:
              schema:
                type: object
                required: [redirectUrl, state]
                properties:
                  redirectUrl: { type: string, format: uri }
                  state: { type: string }

  /v1/auth/oauth/{provider}/callback:
    get:
      tags: [auth]
      summary: OAuth callback
      security: []
      parameters:
        - { in: path, name: provider, required: true, schema: { $ref: "#/components/schemas/OAuthProvider" } }
        - { in: query, name: code, required: true, schema: { type: string } }
        - { in: query, name: state, required: true, schema: { type: string } }
      responses:
        "200":
          description: Issued tokens
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccessTokenResponse" }

  /v1/auth/refresh:
    post:
      tags: [auth]
      summary: Rotate refresh, return new access
      security: []
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccessTokenResponse" }
        "401": { $ref: "#/components/responses/Problem" }

  /v1/auth/logout:
    post:
      tags: [auth]
      summary: Invalidate refresh family
      responses:
        "204": { description: Logged out }

  # ───────────────────────── lti ─────────────────────────
  /v1/lti/login_initiation:
    post:
      tags: [lti]
      summary: OIDC third-party initiated login
      security: []
      responses:
        "302": { description: Redirect to platform }

  /v1/lti/auth:
    post:
      tags: [lti]
      summary: id_token receiver
      security: []
      responses:
        "302": { description: Authenticated; redirect into workspace }

  /v1/lti/jwks:
    get:
      tags: [lti]
      summary: Public JWKS
      security: []
      responses:
        "200":
          description: JWKS document
          content:
            application/json:
              schema: { type: object }

  # ───────────────────────── me ─────────────────────────
  /v1/me:
    get:
      tags: [me]
      summary: Current user
      responses:
        "200":
          description: User
          content:
            application/json: { schema: { $ref: "#/components/schemas/User" } }
    patch:
      tags: [me]
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UserPatch" }
      responses:
        "200":
          description: Updated
          content:
            application/json: { schema: { $ref: "#/components/schemas/User" } }

  # ───────────────────────── tenants ─────────────────────────
  /v1/tenants/me:
    get:
      tags: [tenants]
      summary: Current tenant
      responses:
        "200":
          description: Tenant
          content:
            application/json: { schema: { $ref: "#/components/schemas/Tenant" } }

  /v1/institutions/{id}:
    get:
      tags: [tenants]
      summary: Public institution metadata
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Institution
          content:
            application/json: { schema: { $ref: "#/components/schemas/Institution" } }

  # ───────────────────────── courses ─────────────────────────
  /v1/courses:
    get:
      tags: [courses]
      summary: List courses (cursor-paged)
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Page of courses
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Course" }
    post:
      tags: [courses]
      summary: Create a course
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CourseCreate" }
      responses:
        "201":
          description: Created
          content:
            application/json: { schema: { $ref: "#/components/schemas/Course" } }

  /v1/courses/{id}:
    parameters:
      - $ref: "#/components/parameters/PathId"
    get:
      tags: [courses]
      summary: Course detail
      responses:
        "200":
          description: Course
          content:
            application/json: { schema: { $ref: "#/components/schemas/Course" } }
    patch:
      tags: [courses]
      summary: Update course
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: "#/components/schemas/CoursePatch" } }
      responses:
        "200":
          description: Updated
          content:
            application/json: { schema: { $ref: "#/components/schemas/Course" } }
    delete:
      tags: [courses]
      summary: Soft-delete course
      responses:
        "204": { description: Deleted }

  /v1/courses/{id}/enrollments:
    post:
      tags: [courses]
      summary: Enrol a user
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, role]
              properties:
                userId: { type: string, format: uuid }
                role: { type: string, enum: [student, ta, instructor] }
      responses:
        "201":
          description: Enrolled
          content:
            application/json: { schema: { $ref: "#/components/schemas/Enrollment" } }

  /v1/courses/{id}/enrollments/{userId}:
    delete:
      tags: [courses]
      summary: Drop enrollment
      parameters:
        - $ref: "#/components/parameters/PathId"
        - { in: path, name: userId, required: true, schema: { type: string, format: uuid } }
      responses:
        "204": { description: Dropped }

  # ───────────────────────── uploads ─────────────────────────
  /v1/uploads/init:
    post:
      tags: [uploads]
      summary: Reserve + sign upload URL
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UploadInitRequest" }
      responses:
        "200":
          description: Signed URL + uploadId
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadInitResponse" }
        "413": { $ref: "#/components/responses/Problem" }
        "429": { $ref: "#/components/responses/Problem" }

  /v1/uploads/{id}/complete:
    post:
      tags: [uploads]
      summary: Mark upload complete, enqueue ingest
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "202":
          description: Accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadBatch" }

  /v1/uploads/{id}:
    get:
      tags: [uploads]
      summary: Upload status
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UploadBatch" }

  # ───────────────────────── documents ─────────────────────────
  /v1/documents:
    get:
      tags: [documents]
      summary: List documents in a course
      parameters:
        - { in: query, name: courseId, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Page of documents
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Document" }

  /v1/documents/{id}:
    get:
      tags: [documents]
      summary: Document + versions
      parameters: [ $ref: "#/components/parameters/PathId" ]
      responses:
        "200":
          description: Document
          content:
            application/json: { schema: { $ref: "#/components/schemas/Document" } }
    delete:
      tags: [documents]
      summary: Soft-delete
      parameters: [ $ref: "#/components/parameters/PathId" ]
      responses:
        "204": { description: Deleted }

  /v1/documents/{id}/versions/{versionId}/chunks:
    get:
      tags: [documents]
      summary: Chunk preview (cursor)
      parameters:
        - $ref: "#/components/parameters/PathId"
        - { in: path, name: versionId, required: true, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Chunks
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: "#/components/schemas/Chunk" }

  # ───────────────────────── graph ─────────────────────────
  /v1/courses/{id}/concepts:
    get:
      tags: [graph]
      summary: List concepts in a course
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Concepts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/Concept" } }

  /v1/courses/{id}/concepts/{conceptId}:
    get:
      tags: [graph]
      summary: Concept detail
      parameters:
        - $ref: "#/components/parameters/PathId"
        - { in: path, name: conceptId, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Concept + adjacent edges
          content:
            application/json:
              schema:
                type: object
                properties:
                  concept: { $ref: "#/components/schemas/Concept" }
                  edges: { type: array, items: { $ref: "#/components/schemas/ConceptEdge" } }

  /v1/courses/{id}/concept-edges:
    get:
      tags: [graph]
      summary: List concept edges
      parameters:
        - $ref: "#/components/parameters/PathId"
        - { in: query, name: kind, schema: { $ref: "#/components/schemas/ConceptEdgeKind" } }
      responses:
        "200":
          description: Edges
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ConceptEdge" } }

  /v1/courses/{id}/graph:
    get:
      tags: [graph]
      summary: Pre-rendered Cytoscape graph
      parameters: [ $ref: "#/components/parameters/PathId" ]
      responses:
        "200":
          description: Cytoscape spec
          content:
            application/json: { schema: { type: object } }

  # ───────────────────────── roadmap ─────────────────────────
  /v1/courses/{id}/roadmaps:
    post:
      tags: [roadmap]
      summary: Generate roadmap (idempotent)
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                weeks: { type: integer, minimum: 1, maximum: 52, default: 12 }
                deadline: { type: string, format: date-time }
      responses:
        "202":
          description: Job accepted
          content:
            application/json: { schema: { $ref: "#/components/schemas/Job" } }

  /v1/courses/{id}/roadmaps/{roadmapId}:
    get:
      tags: [roadmap]
      summary: Roadmap detail
      parameters:
        - $ref: "#/components/parameters/PathId"
        - { in: path, name: roadmapId, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Roadmap
          content:
            application/json: { schema: { $ref: "#/components/schemas/Roadmap" } }

  /v1/milestones/{id}:
    patch:
      tags: [roadmap]
      summary: Mark milestone
      parameters: [ $ref: "#/components/parameters/PathId" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [pending, in_progress, completed, skipped] }
      responses:
        "200":
          description: Updated
          content:
            application/json: { schema: { $ref: "#/components/schemas/Milestone" } }

  # ───────────────────────── flashcards ─────────────────────────
  /v1/courses/{id}/flashcards/generate:
    post:
      tags: [flashcards]
      summary: Generate flashcards (SSE progress)
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: { schema: { type: string } }

  /v1/flashcards/decks/{deckId}:
    get:
      tags: [flashcards]
      summary: Deck + cards
      parameters:
        - { in: path, name: deckId, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: Deck
          content:
            application/json: { schema: { $ref: "#/components/schemas/FlashcardDeck" } }

  /v1/flashcards/{id}/review:
    post:
      tags: [flashcards]
      summary: SRS review
      parameters: [ $ref: "#/components/parameters/PathId" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rating]
              properties:
                rating: { type: integer, minimum: 0, maximum: 5 }
      responses:
        "200":
          description: Next due time
          content:
            application/json:
              schema:
                type: object
                properties:
                  nextDueAt: { type: string, format: date-time }

  # ───────────────────────── quizzes ─────────────────────────
  /v1/courses/{id}/quizzes/generate:
    post:
      tags: [quizzes]
      summary: Generate a quiz
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                difficulty: { type: integer, minimum: 0, maximum: 100, default: 50 }
                itemCount: { type: integer, minimum: 1, maximum: 50, default: 10 }
                concepts: { type: array, items: { type: string, format: uuid } }
      responses:
        "202":
          description: Job accepted
          content:
            application/json: { schema: { $ref: "#/components/schemas/Job" } }

  /v1/quizzes/{id}:
    get:
      tags: [quizzes]
      summary: Quiz + items
      parameters: [ $ref: "#/components/parameters/PathId" ]
      responses:
        "200":
          description: Quiz
          content:
            application/json: { schema: { $ref: "#/components/schemas/Quiz" } }

  /v1/quizzes/{id}/attempts:
    post:
      tags: [quizzes]
      summary: Start an attempt
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "201":
          description: Attempt
          content:
            application/json: { schema: { $ref: "#/components/schemas/QuizAttempt" } }

  /v1/attempts/{id}/items/{itemId}:
    patch:
      tags: [quizzes]
      summary: Save answer to an item
      parameters:
        - $ref: "#/components/parameters/PathId"
        - { in: path, name: itemId, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json: { schema: { type: object } }
      responses:
        "204": { description: Saved }

  /v1/attempts/{id}/submit:
    post:
      tags: [quizzes]
      summary: Submit + grade
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200":
          description: Result
          content:
            application/json: { schema: { $ref: "#/components/schemas/QuizAttempt" } }

  # ───────────────────────── chat ─────────────────────────
  /v1/chat/sessions:
    get:
      tags: [chat]
      summary: List sessions
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Sessions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/ChatSession" } }
    post:
      tags: [chat]
      summary: New session
      parameters: [ $ref: "#/components/parameters/IdempotencyKey" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                courseId: { type: string, format: uuid }
                title: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json: { schema: { $ref: "#/components/schemas/ChatSession" } }

  /v1/chat/sessions/{id}/messages:
    get:
      tags: [chat]
      summary: Cursor-paged history
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/Message" } }
    post:
      tags: [chat]
      summary: Ask a question (SSE stream)
      parameters:
        - $ref: "#/components/parameters/PathId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string, minLength: 1, maxLength: 8000 }
      responses:
        "200":
          description: SSE stream of `meta` + `token` + `citation` + `done` events
          content:
            text/event-stream: { schema: { type: string } }

  # ───────────────────────── search ─────────────────────────
  /v1/search:
    get:
      tags: [search]
      summary: Hybrid search
      parameters:
        - { in: query, name: q, required: true, schema: { type: string, minLength: 1 } }
        - { in: query, name: courseId, schema: { type: string, format: uuid } }
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/SearchHit" } }

  # ───────────────────────── notifications ─────────────────────────
  /v1/notifications:
    get:
      tags: [notifications]
      summary: Inbox
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/Notification" } }

  /v1/notifications/{id}/read:
    patch:
      tags: [notifications]
      summary: Mark read
      parameters: [ $ref: "#/components/parameters/PathId" ]
      responses:
        "204": { description: Read }

  # ───────────────────────── billing ─────────────────────────
  /v1/billing/subscription:
    get:
      tags: [billing]
      summary: Subscription + usage
      responses:
        "200":
          description: Subscription
          content:
            application/json: { schema: { $ref: "#/components/schemas/Subscription" } }

  /v1/billing/checkout:
    post:
      tags: [billing]
      summary: Begin Stripe Checkout
      parameters: [ $ref: "#/components/parameters/IdempotencyKey" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tier]
              properties:
                tier: { type: string, enum: [pro] }
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }

  /v1/billing/portal:
    post:
      tags: [billing]
      summary: Stripe Customer Portal link
      responses:
        "200":
          description: Portal URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  url: { type: string, format: uri }

  /v1/billing/stripe-webhook:
    post:
      tags: [billing]
      summary: Stripe event receiver (HMAC verified)
      security: []
      requestBody:
        required: true
        content:
          application/json: { schema: { type: object } }
      responses:
        "200": { description: Acked }
        "400": { $ref: "#/components/responses/Problem" }

  # ───────────────────────── byok ─────────────────────────
  /v1/me/byok:
    get:
      tags: [byok]
      summary: List BYOK keys (last4 + provider only)
      responses:
        "200":
          description: Keys
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ApiKey" }
    post:
      tags: [byok]
      summary: Add BYOK key (validated, envelope-encrypted)
      parameters: [ $ref: "#/components/parameters/IdempotencyKey" ]
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: "#/components/schemas/ApiKeyCreate" } }
      responses:
        "201":
          description: Stored
          content:
            application/json: { schema: { $ref: "#/components/schemas/ApiKey" } }

  /v1/me/byok/{id}:
    delete:
      tags: [byok]
      summary: Revoke key
      parameters: [ $ref: "#/components/parameters/PathId" ]
      responses:
        "204": { description: Revoked }

  # ───────────────────────── dsar ─────────────────────────
  /v1/me/dsar/export:
    post:
      tags: [dsar]
      summary: Request data export (Art. 20)
      parameters: [ $ref: "#/components/parameters/IdempotencyKey" ]
      responses:
        "202":
          description: Accepted
          content:
            application/json: { schema: { $ref: "#/components/schemas/DSARRequest" } }

  /v1/me/dsar/delete:
    post:
      tags: [dsar]
      summary: Request erasure (Art. 17) — requires re-auth
      parameters: [ $ref: "#/components/parameters/IdempotencyKey" ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reauthToken]
              properties:
                reauthToken: { type: string }
      responses:
        "202":
          description: Accepted
          content:
            application/json: { schema: { $ref: "#/components/schemas/DSARRequest" } }

  /v1/me/dsar/{id}:
    get:
      tags: [dsar]
      summary: DSAR status + signed download URL
      parameters: [ $ref: "#/components/parameters/PathId" ]
      responses:
        "200":
          description: Status
          content:
            application/json: { schema: { $ref: "#/components/schemas/DSARRequest" } }

  # ───────────────────────── admin ─────────────────────────
  /v1/admin/tenants:
    get:
      tags: [admin]
      summary: List institution tenants
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Tenants
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/Tenant" } }

  /v1/admin/usage:
    get:
      tags: [admin]
      summary: Aggregate usage
      parameters:
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to,   schema: { type: string, format: date-time } }
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Usage rollups
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/UsageRollup" } }

  /v1/admin/audit:
    get:
      tags: [admin]
      summary: Audit log slice
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Audit events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Page"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/AuditLogEntry" } }

  /v1/admin/feature-flags/{name}:
    post:
      tags: [admin]
      summary: Toggle or update targeting
      parameters:
        - { in: path, name: name, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enabled: { type: boolean }
                rules: { type: object }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FeatureFlag" }

components:
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Cursor:
      in: query
      name: cursor
      schema: { type: string, nullable: true, description: "Opaque pagination cursor" }
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema: { type: string, minLength: 16, maxLength: 64 }
    PathId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }

  responses:
    HealthOk:
      description: OK
      content:
        application/json:
          schema:
            type: object
            properties:
              status: { type: string, enum: [ok] }
              service: { type: string }
              ts: { type: string, format: date-time }
    Problem:
      description: Problem (RFC 9457)
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  schemas:
    Problem:
      type: object
      required: [type, title, status, code]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        code: { type: string, description: "Stable machine-readable code (e.g. upload.size-exceeded)" }
        traceId: { type: string }
        tenantId: { type: string, format: uuid, nullable: true }
        fields:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              reason: { type: string }

    Page:
      type: object
      required: [data, page]
      properties:
        page:
          type: object
          required: [limit]
          properties:
            nextCursor: { type: string, nullable: true }
            prevCursor: { type: string, nullable: true }
            limit: { type: integer }

    OAuthProvider:
      type: string
      enum: [google, microsoft, github]

    AccessTokenResponse:
      type: object
      required: [accessToken, expiresIn]
      properties:
        accessToken: { type: string }
        expiresIn: { type: integer, description: "Seconds" }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        role: { type: string, enum: [student, instructor, admin, institution_admin] }
        locale: { type: string }
        timezone: { type: string }
        tenantId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    UserPatch:
      type: object
      properties:
        locale: { type: string }
        timezone: { type: string }

    Tenant:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        kind: { type: string, enum: [personal, institutional] }
        region: { type: string, enum: [us, eu, ap] }
        tier: { type: string, enum: [free, pro, byok, institutional] }
        institutionId: { type: string, format: uuid, nullable: true }

    Institution:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        domain: { type: string }
        region: { type: string }

    Course:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        code: { type: string, nullable: true }
        description: { type: string, nullable: true }
        visibility: { $ref: "#/components/schemas/CourseVisibility" }
        contentHash: { type: string, nullable: true }
        sharedFromCourseId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }

    CourseCreate:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        code: { type: string, nullable: true }
        description: { type: string, nullable: true }
        visibility: { $ref: "#/components/schemas/CourseVisibility" }

    CoursePatch:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        visibility: { $ref: "#/components/schemas/CourseVisibility" }

    CourseVisibility:
      type: string
      enum: [private, shared, public]
      default: private

    Enrollment:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        courseId: { type: string, format: uuid }
        role: { type: string, enum: [student, ta, instructor] }
        joinedAt: { type: string, format: date-time }

    UploadInitRequest:
      type: object
      required: [filename, mime, sizeBytes, sha256]
      properties:
        courseId: { type: string, format: uuid, nullable: true }
        filename: { type: string, minLength: 1, maxLength: 255 }
        mime: { type: string }
        sizeBytes: { type: integer, minimum: 1, maximum: 2147483648 }
        sha256: { type: string, pattern: "^[a-f0-9]{64}$" }

    UploadInitResponse:
      type: object
      required: [uploadId, signedUrl, expiresAt]
      properties:
        uploadId: { type: string, format: uuid }
        signedUrl: { type: string, format: uri }
        expiresAt: { type: string, format: date-time }
        headers:
          type: object
          description: Headers the client MUST include with the PUT to S3.

    UploadBatch:
      type: object
      properties:
        id: { type: string, format: uuid }
        state: { type: string, enum: [initiated, uploading, uploaded, scanning, extracting, embedding, ready, failed, quarantined] }
        safetyFlags: { type: array, items: { type: string } }
        errorReason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time, nullable: true }

    Document:
      type: object
      properties:
        id: { type: string, format: uuid }
        originalFilename: { type: string }
        mime: { type: string }
        pageCount: { type: integer, nullable: true }
        language: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    Chunk:
      type: object
      properties:
        id: { type: string, format: uuid }
        ordinal: { type: integer }
        modality: { type: string }
        page: { type: integer, nullable: true }
        slide: { type: integer, nullable: true }
        cell: { type: integer, nullable: true }
        charStart: { type: integer }
        charEnd: { type: integer }
        content: { type: string }

    Concept:
      type: object
      properties:
        id: { type: string, format: uuid }
        label: { type: string }
        description: { type: string, nullable: true }
        difficulty: { type: integer }

    ConceptEdge:
      type: object
      properties:
        id: { type: string, format: uuid }
        fromId: { type: string, format: uuid }
        toId: { type: string, format: uuid }
        kind: { $ref: "#/components/schemas/ConceptEdgeKind" }
        weight: { type: number }

    ConceptEdgeKind:
      type: string
      enum: [prerequisite_of, related_to, example_of, derived_from, contradicts]

    Roadmap:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        weeks: { type: integer }
        deadline: { type: string, format: date-time, nullable: true }
        milestones: { type: array, items: { $ref: "#/components/schemas/Milestone" } }

    Milestone:
      type: object
      properties:
        id: { type: string, format: uuid }
        weekIndex: { type: integer }
        ordinal: { type: integer }
        title: { type: string }
        effortMin: { type: integer }
        status: { type: string, enum: [locked, pending, in_progress, completed, skipped] }

    FlashcardDeck:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        flashcards: { type: array, items: { $ref: "#/components/schemas/Flashcard" } }

    Flashcard:
      type: object
      properties:
        id: { type: string, format: uuid }
        front: { type: string }
        back: { type: string }
        citationCount: { type: integer }

    Quiz:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        difficulty: { type: integer }
        timeLimitSec: { type: integer, nullable: true }
        items: { type: array, items: { $ref: "#/components/schemas/QuizItem" } }

    QuizItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [mcq, true_false, short_answer, coding, scenario] }
        prompt: { type: string }
        payload: { type: object }
        difficulty: { type: integer }

    QuizAttempt:
      type: object
      properties:
        id: { type: string, format: uuid }
        quizId: { type: string, format: uuid }
        state: { type: string, enum: [in_progress, submitted, graded, abandoned] }
        score: { type: number, nullable: true }
        startedAt: { type: string, format: date-time }
        submittedAt: { type: string, format: date-time, nullable: true }

    ChatSession:
      type: object
      properties:
        id: { type: string, format: uuid }
        courseId: { type: string, format: uuid, nullable: true }
        title: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    Message:
      type: object
      properties:
        id: { type: string, format: uuid }
        role: { type: string, enum: [user, assistant, system, tool] }
        content: { type: string }
        providerId: { type: string, nullable: true }
        model: { type: string, nullable: true }
        tokensIn: { type: integer, nullable: true }
        tokensOut: { type: integer, nullable: true }
        cacheHit: { type: boolean, nullable: true }
        refusal: { type: boolean }
        createdAt: { type: string, format: date-time }
        citations:
          type: array
          items:
            type: object
            properties:
              chunkId: { type: string, format: uuid }
              score: { type: number }
              page: { type: integer, nullable: true }

    SearchHit:
      type: object
      properties:
        chunkId: { type: string, format: uuid }
        documentId: { type: string, format: uuid }
        score: { type: number }
        snippet: { type: string }

    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        kind: { type: string }
        channel: { type: string, enum: [email, push, in_app] }
        subject: { type: string }
        body: { type: string }
        readAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }

    Subscription:
      type: object
      properties:
        tier: { type: string, enum: [free, pro, byok, institutional] }
        status: { type: string, enum: [trialing, active, past_due, canceled, unpaid, incomplete] }
        currentPeriodStart: { type: string, format: date-time }
        currentPeriodEnd: { type: string, format: date-time }
        usage:
          type: object
          properties:
            dailyTokensUsed: { type: integer }
            dailyTokensLimit: { type: integer }
            monthlyTokensUsed: { type: integer }
            monthlyTokensLimit: { type: integer, description: "-1 for unlimited" }

    ApiKey:
      type: object
      properties:
        id: { type: string, format: uuid }
        provider: { type: string }
        last4: { type: string }
        label: { type: string, nullable: true }
        validatedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        revokedAt: { type: string, format: date-time, nullable: true }

    ApiKeyCreate:
      type: object
      required: [provider, key]
      properties:
        provider: { type: string, enum: [openai, anthropic, google, openrouter, groq] }
        key: { type: string, minLength: 16, description: "Plaintext; never logged or stored." }
        label: { type: string, nullable: true }

    DSARRequest:
      type: object
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [access, erasure, portability, rectification] }
        state: { type: string, enum: [received, in_progress, completed, rejected] }
        dueBy: { type: string, format: date-time }
        evidenceDownloadUrl: { type: string, format: uri, nullable: true }
        createdAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time, nullable: true }

    Job:
      type: object
      properties:
        id: { type: string, format: uuid }
        kind: { type: string }
        state: { type: string, enum: [queued, running, succeeded, failed, dead_letter] }
        attempts: { type: integer }
        scheduledFor: { type: string, format: date-time }

    UsageRollup:
      type: object
      properties:
        tenantId: { type: string, format: uuid }
        date: { type: string, format: date }
        providerId: { type: string }
        tokensIn: { type: integer }
        tokensOut: { type: integer }
        cacheHitRate: { type: number }
        costMicroUsd: { type: integer }

    AuditLogEntry:
      type: object
      properties:
        id: { type: integer, format: int64 }
        ts: { type: string, format: date-time }
        actorKind: { type: string }
        actorId: { type: string, format: uuid, nullable: true }
        action: { type: string }
        resource: { type: string, nullable: true }

    FeatureFlag:
      type: object
      properties:
        name: { type: string }
        enabled: { type: boolean }
        rules: { type: object }
