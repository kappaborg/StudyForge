apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "studyforge.fullname" . }}-api
  labels:
    {{- include "studyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.replicas.api }}
  selector:
    matchLabels:
      {{- include "studyforge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "studyforge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "studyforge.imageRef" (dict "Values" .Values "key" "api") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - secretRef: { name: {{ .Values.secrets.database }} }
            - secretRef: { name: {{ .Values.secrets.redis }} }
            - secretRef: { name: {{ .Values.secrets.s3 }} }
            - secretRef: { name: {{ .Values.secrets.jwt }} }
            - secretRef: { name: {{ .Values.secrets.kek }} }
            - secretRef: { name: {{ .Values.secrets.providers }} }
            - secretRef: { name: {{ .Values.secrets.stripe }} }
          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
          readinessProbe:
            httpGet: { path: /health/ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
