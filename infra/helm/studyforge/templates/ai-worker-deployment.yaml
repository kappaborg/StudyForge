apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "studyforge.fullname" . }}-ai-worker
  labels:
    {{- include "studyforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai-worker
spec:
  replicas: {{ .Values.replicas.aiWorker }}
  selector:
    matchLabels:
      {{- include "studyforge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: ai-worker
  template:
    metadata:
      labels:
        {{- include "studyforge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: ai-worker
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: ai-worker
          image: {{ include "studyforge.imageRef" (dict "Values" .Values "key" "aiWorker") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8001
              name: http
          envFrom:
            - secretRef: { name: {{ .Values.secrets.database }} }
            - secretRef: { name: {{ .Values.secrets.redis }} }
            - secretRef: { name: {{ .Values.secrets.s3 }} }
            - secretRef: { name: {{ .Values.secrets.providers }} }
          env:
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.resources.aiWorker | nindent 12 }}
