name: release

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # Cosign keyless signing via OIDC
  packages: write   # ghcr.io publish

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build-and-sign:
    name: build · sbom · sign — ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        service: [web, api, ai-worker]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/studyforge-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build + push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Scan published image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/studyforge-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/studyforge-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: ${{ matrix.service }}.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}
          path: ${{ matrix.service }}.spdx.json
          retention-days: 365

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via OIDC)
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/studyforge-${{ matrix.service }}@${{ steps.build.outputs.digest }}

      - name: Attest SBOM
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          cosign attest --yes --predicate ${{ matrix.service }}.spdx.json --type spdx \
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/studyforge-${{ matrix.service }}@${{ steps.build.outputs.digest }}

  deploy-staging:
    name: Deploy → staging
    needs: build-and-sign
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.studyforge.ai
    steps:
      - uses: actions/checkout@v4

      - name: Render manifests
        run: |
          # Phase 4 wires Helm + cluster credentials. For now we render the
          # chart locally so a failed templating fails the gate.
          if command -v helm >/dev/null 2>&1; then
            helm template studyforge infra/helm/studyforge \
              --values infra/helm/studyforge/values-staging.yaml \
              --set image.web.digest=${{ needs.build-and-sign.outputs.web_digest || 'sha256:placeholder' }} \
              > /tmp/staging.yaml
            wc -l /tmp/staging.yaml
          else
            echo "helm not on runner; chart linting only"
          fi

  deploy-prod:
    name: Deploy → production
    needs: [build-and-sign, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://studyforge.ai
    steps:
      - uses: actions/checkout@v4
      - name: Manual gate (environment review)
        run: echo "production deploy requires the GitHub environment approval (configured in repo settings)"
