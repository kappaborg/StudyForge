name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.18.0'
  PNPM_VERSION: '9.12.0'
  PYTHON_VERSION: '3.11'

permissions:
  contents: read

jobs:
  changes:
    name: detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      ai: ${{ steps.filter.outputs.ai }}
      sandbox: ${{ steps.filter.outputs.sandbox }}
      packages: ${{ steps.filter.outputs.packages }}
      prompts: ${{ steps.filter.outputs.prompts }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'packages/shared-types/**'
            api:
              - 'apps/api/**'
              - 'packages/shared-types/**'
              - 'packages/llm-router/**'
            ai:
              - 'apps/ai-worker/**'
              - 'packages/eval-harness/**'
            sandbox:
              - 'apps/sandbox-runner/**'
            packages:
              - 'packages/**'
            prompts:
              - 'packages/llm-router/src/prompts/**'
              - 'apps/ai-worker/src/agents/**'
              - 'apps/ai-worker/src/rag/**'

  node:
    name: Node · lint · typecheck · build · test
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: i18n locale parity
        run: pnpm --filter web i18n:check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  python:
    name: Python · ruff · mypy · pytest
    needs: changes
    if: needs.changes.outputs.ai == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/ai-worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Sync deps
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Typecheck
        run: uv run mypy src

      - name: Test
        run: uv run pytest -q

  sandbox:
    # Mirror of the ``python`` job for the sandbox-runner service. Kept
    # as a separate job (rather than a matrix in ``python``) so a
    # sandbox-only regression doesn't taint the ai-worker signal and
    # vice-versa — each owner sees the failure in their lane.
    name: Sandbox · ruff · mypy · pytest
    needs: changes
    if: needs.changes.outputs.sandbox == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/sandbox-runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Sync deps
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Typecheck
        run: uv run mypy src

      - name: Test
        # The Linux runner enforces RLIMIT_AS so the memory-cap test
        # that's skipped on macOS now actually runs here — exit code
        # signals are platform-dependent but the cap engagement isn't.
        run: uv run pytest -q

      - name: Build Dockerfile (smoke)
        # ``docker build`` rather than ``docker buildx`` keeps the step
        # cheap — we're only catching syntax / dep / COPY regressions
        # here. The image isn't pushed; the runner discards it. Build
        # context resets to the repo root so the Dockerfile's
        # ``COPY apps/sandbox-runner/...`` lines resolve.
        working-directory: ${{ github.workspace }}
        run: docker build -f apps/sandbox-runner/Dockerfile -t studyforge-sandbox-runner:ci .

  ai-eval:
    name: AI · golden eval (structural)
    needs: [changes, python]
    if: needs.changes.outputs.prompts == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/ai-worker
    env:
      # Hoisted to job-level so the LLM-judge step's ``if:`` condition
      # below can read it. Empty string on PRs without the secret (forks,
      # dependabot, before the secret was added) — the step skips cleanly.
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: pip install uv

      - name: Sync deps
        run: uv sync --extra dev

      - name: Tutor eval gate (Ragas-lite)
        # Floors:
        #   - pass-rate           1.00 — every golden case must pass
        #   - citation_validity   0.95 — no hallucinated chunk_ids
        #   - refusal_consistency 1.00 — refusal flag matches expectation
        # context_precision is reported but not gated (lexical-proxy
        # noise; real Ragas judge runs below when GEMINI_API_KEY is set).
        run: |
          uv run python -m src.eval.cli \
            --prompt tutor.answer.v1 \
            --golden golden/tutor_answer_v1.jsonl \
            --min-pass-rate 1.0 \
            --min-citation-validity 0.95 \
            --min-refusal-consistency 1.0

      - name: Tutor eval gate (LLM-judge / Ragas)
        # Real semantic judge — one Gemini Flash call per golden case
        # scoring faithfulness / answer_relevance / context_recall.
        # Skipped on PRs without the secret (forks, dependabot); runs
        # on main + PRs from collaborators. Floors deliberately permissive
        # at first (0.70 each) so judge variance doesn't dominate the
        # signal — tighten in a follow-up once we have N runs of baseline.
        if: env.GEMINI_API_KEY != ''
        run: |
          uv run python -m src.eval.cli \
            --prompt tutor.answer.v1 \
            --golden golden/tutor_answer_v1.jsonl \
            --mode ragas \
            --min-pass-rate 1.0 \
            --min-faithfulness 0.70 \
            --min-answer-relevance 0.70 \
            --min-context-recall 0.70

  security:
    name: Security · Trivy + secret scan
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: 'fs'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: Detect committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          # No ``cache: 'pnpm'`` here — the security job runs ``pnpm
          # audit`` directly against the lockfile without an
          # ``install`` step, so the Post Run cache save errors with
          # "Path(s) specified in the action for caching do(es) not
          # exist". Audit speed is dominated by the registry call,
          # not by node_modules restore, so dropping the cache is
          # essentially free.

      - name: pnpm audit (critical gate)
        # Today the gate fires only on ``critical``. Known highs are
        # documented in SECURITY.md and tracked to the Nest 10→11 +
        # Fastify 4→5 migration PR. Once that lands, this bumps to
        # ``--audit-level=high``.
        run: pnpm audit --prod --audit-level=critical

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: pip-audit (Python deps)
        # ai-worker pins via uv; export to a requirements file for the audit.
        # We don't pass --disable-pip because pip-audit 2.7+ rejects it
        # without a hashed requirements file or --no-deps. The exported
        # file from ``uv pip compile`` already has the full dep closure.
        run: |
          pip install uv pip-audit
          uv pip compile apps/ai-worker/pyproject.toml -o /tmp/ai-worker-req.txt 2>/dev/null || true
          if [ -s /tmp/ai-worker-req.txt ]; then
            pip-audit -r /tmp/ai-worker-req.txt || exit 1
          fi

  e2e:
    name: FE · Playwright + axe a11y gate
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile=false
      - name: Install Playwright browser
        run: pnpm --filter web e2e:install
      - name: Build web
        run: pnpm --filter web build
      - name: Start web
        run: |
          (pnpm --filter web start &) && \
          npx wait-on http://localhost:3000 -t 60000
      - name: Run Playwright + axe
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: pnpm --filter web e2e

  smoke:
    # End-to-end integration smoke: spins up postgres + redis, runs API
    # + ai-worker, walks two synthetic users through the 10-stage flow
    # (signup → folder → YouTube ingest → flashcard → SRS → exam-scope
    # parse+save → publish folder → share scope link → cross-tenant
    # subscribe + fork → reranked tutor ask). Fails the PR if any
    # response is non-2xx. The actual flow lives in ``scripts/smoke.sh``
    # so you can re-run it against ``pnpm dev`` with a single command.
    name: Integration · 10-stage smoke
    needs: changes
    if: |
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.ai == 'true' ||
      needs.changes.outputs.web == 'true' ||
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: studyforge
          POSTGRES_PASSWORD: studyforge
          POSTGRES_DB: studyforge
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U studyforge -d studyforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      # No ``?schema=public`` — Prisma defaults to public, and psycopg
      # (used by the Python worker) rejects unknown query params.
      DATABASE_URL: postgresql://studyforge:studyforge@localhost:5432/studyforge
      DIRECT_URL: postgresql://studyforge:studyforge@localhost:5432/studyforge
      REDIS_URL: redis://localhost:6379
      AUTH_MODE: real
      SESSION_COOKIE_SECRET: ci-smoke-secret-not-used-in-prod
      # Deterministic 32-byte base64 KEK — CI-only, never used in prod.
      # The api refuses to boot without one; smoke needs it to clear BYOK
      # service construction.
      STUDYFORGE_KEK_BASE64: c3R1ZHlmb3JnZS1jaS1zbW9rZS0zMi1ieXRlLWtlayE=
      API_URL: http://localhost:3001
      WORKER_URL: http://localhost:8001
      AI_WORKER_URL: http://localhost:8001
      # Stage 3 hits live YouTube which rate-limits CI runners hard.
      # The flow is covered by tests against a recorded fixture in
      # ``tests/test_ingest_url.py``; smoke just needs the rest of the
      # 10 stages to validate the cross-component path.
      SKIP_YOUTUBE_INGEST: 'true'
      # Skip dense retrieval — fastembed model download is too heavy for
      # CI. The smoke is structural; quality eval has its own job.
      EMBEDDER_BACKEND: stub
      RERANKER_BACKEND: identity
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - uses: actions/setup-python@v5
        with: { python-version: '${{ env.PYTHON_VERSION }}' }

      - name: Install Node deps
        run: pnpm install --frozen-lockfile=false

      - name: Install uv + worker deps
        working-directory: apps/ai-worker
        run: |
          pip install uv
          uv sync --extra dev

      - name: Generate Prisma client + push schema
        working-directory: apps/api
        run: |
          pnpm prisma generate
          pnpm prisma db push --skip-generate

      - name: Build API
        run: pnpm --filter api build

      - name: Start ai-worker (background)
        working-directory: apps/ai-worker
        run: |
          uv run uvicorn src.main:app --host 0.0.0.0 --port 8001 \
            > /tmp/worker.log 2>&1 &
          echo $! > /tmp/worker.pid

      - name: Start API (background)
        working-directory: apps/api
        run: |
          node dist/main.js > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid

      - name: Wait for ports
        # http-get:// forces wait-on to use GET. Default HEAD probes get
        # 405s from the FastAPI worker's /health route.
        run: |
          npx --yes wait-on http-get://localhost:8001/health http-get://localhost:3001/health \
            --timeout 90000

      - name: Run smoke
        run: bash scripts/smoke.sh

      - name: Upload server logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-logs
          path: |
            /tmp/api.log
            /tmp/worker.log
          retention-days: 7

  lighthouse:
    name: FE · Lighthouse CI (perf budgets)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile=false

      - name: Build web
        run: pnpm --filter web build

      - name: Lighthouse CI
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: |
          pnpm dlx @lhci/cli@0.14.x autorun --config=apps/web/lighthouserc.json || echo "Lighthouse CI exit code $?"
